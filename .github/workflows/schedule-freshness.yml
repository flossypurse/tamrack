name: Tamrack Schedule Freshness

# Checks that the daily-collection schedule has run within the last 25 hours.
# Fires every 6 hours so a stale schedule is caught within 6h of the miss.
# Opens a GitHub issue on failure for paging via GH notifications.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: check daily-collection lastRunAt
        id: freshness
        env:
          RESONATE_COLLECTOR_TOKEN: ${{ secrets.RESONATE_COLLECTOR_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${RESONATE_COLLECTOR_TOKEN:-}" ]]; then
            echo "::error::RESONATE_COLLECTOR_TOKEN secret not set"
            exit 1
          fi

          payload=$(jq -n \
            --arg token "$RESONATE_COLLECTOR_TOKEN" \
            '{
              kind: "schedule.get",
              head: { corrId: "freshness-probe", version: "2026-04-01", auth: $token },
              data: { id: "daily-collection" }
            }')

          response=$(curl -fsS --max-time 15 \
            -X POST https://tamrack-resonate-server.fly.dev/ \
            -H "Content-Type: application/json" \
            -d "$payload")

          echo "response=$response"

          status=$(echo "$response" | jq -r '.head.status')
          if [[ "$status" != "200" ]]; then
            echo "::error::schedule.get returned status $status"
            echo "$response" | jq .
            exit 1
          fi

          last_run_at=$(echo "$response" | jq -r '.data.schedule.lastRunAt')
          now_ms=$(date +%s%3N)
          diff_ms=$(( now_ms - last_run_at ))
          diff_h=$(( diff_ms / 3600000 ))
          threshold_ms=90000000

          echo "lastRunAt=$last_run_at now=$now_ms diff_ms=$diff_ms diff_h=${diff_h}h"

          if (( diff_ms > threshold_ms )); then
            echo "hours_stale=${diff_h}" >> "$GITHUB_OUTPUT"
            echo "::error::daily-collection schedule is stale: ${diff_h}h since last run (threshold 25h)"
            exit 1
          fi

          echo "daily-collection freshness OK (${diff_h}h since last run)"

      - name: file issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const hourStale = '${{ steps.freshness.outputs.hours_stale }}' || 'unknown';
            const title = `[freshness] daily-collection schedule lastRunAt stale (${hourStale}h ago)`;
            const body = [
              `Freshness probe detected that the \`daily-collection\` schedule has not run within the last 25 hours.`,
              ``,
              `See [run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.`,
              ``,
              `If this is the first failure of a streak, it may be a transient scheduling blip — check the Resonate server logs.`,
              `If it persists, treat as an active incident.`,
            ].join("\n");
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "freshness,auto",
              state: "open",
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["freshness", "auto"],
              });
            }
